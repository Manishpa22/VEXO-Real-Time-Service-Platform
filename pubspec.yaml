name: vexo_app
description: "VEXO - On-demand car & bike cleaning service"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_riverpod: ^3.3.1
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  lottie: ^3.3.1
  fl_chart: ^1.2.0
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^2.0.1
  flutter_animate: ^4.5.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  share_plus: ^13.0.0
  pin_code_fields: ^9.3.0
  percent_indicator: ^4.2.3
  http: ^1.4.0
  flutter_secure_storage: ^8.1.0
  shared_preferences: ^2.5.3
  firebase_auth: ^6.3.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  confetti: ^0.8.0
  easy_localization: ^3.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/translations/
